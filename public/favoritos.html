<!DOCTYPE html>
<html lang="pt-PT" data-tema="claro">
<head>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header" role="banner">
  <div class="header-topo"><div class="container inner"><span class="header-topo__data" id="header-date"></span><nav class="header-topo__links"><a href="/admin">Administração</a><a href="/favoritos">Favoritos</a></nav></div></div>
  <div class="header-main"><div class="container inner">
    <form class="search-form" id="search-form" role="search" onsubmit="return false;"><input type="search" id="search-input" placeholder="Pesquisar…" autocomplete="off"><button type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button></form>
    <a href="/" class="logo"><div class="logo__badge"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><div><span class="logo__nome">Encarnado</span><span class="logo__slogan">O pulso do Benfica</span></div></a>
    <div class="header-controls">
      <button class="btn-control btn-favs" onclick="location.href='/favoritos'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span class="label">Favoritos</span><span id="fav-count"></span></button>
      <button class="btn-control" id="btn-tema" onclick="toggleTema()">☾ Escuro</button>
      <button class="btn-control btn-menu" id="btn-menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </div></div>
  <nav class="site-nav" id="site-nav"><div class="container"><ul class="site-nav__list">
    <li><a href="/" class="site-nav__link">Início</a></li>
    <li><a href="/?categoria=Futebol" class="site-nav__link">Futebol</a></li>
    <li><a href="/?categoria=Modalidades" class="site-nav__link">Modalidades</a></li>
    <li><a href="/?categoria=Mercado" class="site-nav__link">Mercado</a></li>
    <li><a href="/?categoria=Formação" class="site-nav__link">Formação</a></li>
    <li><a href="/?categoria=Opinião" class="site-nav__link">Opinião</a></li>
  </ul></div></nav>
  <div class="search-results" id="search-results"></div>
</header>

<main class="page-wrap" role="main">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--preto);padding-bottom:9px;margin-bottom:24px;">
      <span style="font-family:var(--fonte-ui);font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;">Os meus <span style="color:var(--vermelho)">Favoritos</span></span>
      <button onclick="clearFavs()" style="font-family:var(--fonte-ui);font-size:10.5px;color:var(--cinza-texto);background:none;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;">Limpar todos</button>
    </div>
    <div class="favs-page" id="favs-wrap">
      <div class="skeleton" style="height:200px;border-radius:2px;"></div>
    </div>
  </div>
</main>

<footer class="site-footer"><div class="container"><div class="footer-bottom" style="border-top:none;padding-top:28px"><span>© 2025 Encarnado.</span><a href="/" style="color:rgba(255,255,255,.35);font-family:var(--fonte-ui);font-size:11px;">← Voltar ao início</a></div></div></footer>
<div id="toast" class="toast"></div>
<script src="/js/main.js"></script>
<script>
function clearFavs() {
  if (confirm('Remover todos os favoritos?')) {
    S.favoritos = [];
    localStorage.removeItem('enc_favs');
    document.getElementById('favs-wrap').innerHTML = '<div class="empty-state"><div class="empty-state__icon">♡</div><p>Ainda não guardou nenhuma notícia.</p></div>';
    Favs.updateCount();
  }
}
</script>
</body>
</html>
