services:
  - type: web
    name: encarnado
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: encarnado2025
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.12.0
